; Transaction pooling — used by docker-compose `pgbouncer` service (dev).
; Host port 6432 maps to this listen port inside the container.

[databases]
* = host=postgres port=5432 dbname=app

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
